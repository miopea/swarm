  # ---- Messages (inter-worker) ----
  /api/messages:
    get:
      tags: [Messages]
      summary: List recent inter-worker messages (filterable; read-only, never marks read)
      parameters:
        - name: q
          in: query
          description: Search over message content (LIKE)
          schema: { type: string }
        - name: unread_only
          in: query
          description: Only messages no recipient has consumed (read_at IS NULL)
          schema: { type: boolean, default: false }
        - name: since
          in: query
          description: Only messages with created_at >= this epoch seconds
          schema: { type: number }
        - name: until
          in: query
          description: Only messages with created_at <= this epoch seconds
          schema: { type: number }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        "200":
          description: Recent messages

  /api/messages/send:
    post:
      tags: [Messages]
      summary: Send a message to a worker (or broadcast with recipient="*")
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [sender, recipient, msg_type, content]
              properties:
                sender:
                  type: string
                  description: Sender worker name or "operator"
                recipient:
                  type: string
                  description: Worker name or "*" for broadcast
                msg_type:
                  type: string
                  enum: [finding, warning, dependency, status, operator]
                content:
                  type: string
      responses:
        "200":
