  /api/feedback/gh-status:
    get:
      tags: [Feedback]
      summary: Check whether the gh CLI is installed and authenticated
      responses:
        "200":
          description: gh availability and auth status

  /api/feedback/save:
    post:
      tags: [Feedback]
      summary: Save a draft feedback entry locally (pre-submit)
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Draft saved

  /api/feedback/last:
    get:
      tags: [Feedback]
      summary: Fetch the last saved draft for editing
      responses:
        "200":
          description: Last draft (or empty if none)

  # ---- Skills Registry ----
  /api/skills:
    get:
      tags: [Config]
      summary: List registered skills
      description: >
        Returns every skill in the DB-backed registry (falls back to the
        in-memory defaults when no store is attached). Skills map task
        types to Claude Code slash commands (e.g. ``bug`` →
        ``/fix-and-ship``). Usage counters increment on each
        ``get_skill_command()`` lookup, so rarely-used skills become
        obvious candidates for retirement.
      responses:
        "200":
          description: Skills list
          content:
            application/json:
              schema:
                type: object
                required: [skills]
                properties:
                  skills:
                    type: array
                    items:
                      type: object
                      required: [name, description, task_types, usage_count]
                      properties:
                        name:
                          type: string
                          description: Slash-command identifier (e.g. ``/fix-and-ship``).
                        description:
                          type: string
                        task_types:
                          type: array
                          items:
                            type: string
                          description: TaskType values this skill serves (``bug``, ``feature``, ``verify``, ``chore``).
                        usage_count:
                          type: integer
                        last_used_at:
                          type: number
                          nullable: true
                          description: Unix timestamp of the most recent lookup, or null if unused.
                        created_at:
                          type: number

  # ---- MCP Transport ----
  # Full tool schemas are served dynamically at runtime via the MCP protocol
  # rather than enumerated statically here; the transport endpoints exist
  # for completeness so clients discovering the API know where to connect.
  /mcp:
    post:
      tags: [MCP]
      summary: Streamable HTTP MCP transport
      description: >
        JSON-RPC over HTTP. Clients identify their worker via ``?worker=<name>``
        query param or ``X-Swarm-Worker`` header. Nine tools are available:
        ``swarm_check_messages``, ``swarm_send_message``, ``swarm_task_status``,
        ``swarm_claim_file``, ``swarm_complete_task``, ``swarm_create_task``,
        ``swarm_get_learnings``, ``swarm_report_progress``, ``swarm_batch``.
        Tool schemas (descriptions, required fields, examples) are returned
        by the ``tools/list`` MCP method.
      responses:
        "200":
          description: JSON-RPC response
        "204":
          description: Notification acknowledged
