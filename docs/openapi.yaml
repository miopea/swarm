              properties:
                title: { type: string, maxLength: 200 }
                body: { type: string, maxLength: 8000 }
                kind: { type: string }
                worker: { type: string }
                task_id: { type: string }
      responses:
        "200":
          description: Thread created and forwarded to the Queen PTY

