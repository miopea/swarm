      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 7
      responses:
        "200":
          description: Per-rule hit counts, override rates

  /api/drones/approval-rate:
    get:
      tags: [Drones]
      summary: Drone auto-approval rate over a rolling window
      description: >
        Returns aggregated counts of CONTINUED (auto-approved) vs
        ESCALATED decisions from the buzz log within the specified
        window. The ``rate`` is ``approvals / (approvals + escalations)``
        or ``null`` when the window contains no relevant entries.
      parameters:
        - name: hours
          in: query
          description: Window size in hours (default 24)
          schema:
            type: number
            default: 24
            minimum: 0
      responses:
        "200":
          description: Approval-rate summary
          content:
            application/json:
              schema:
                type: object
                required: [approvals, escalations, rate, window_hours]
                properties:
                  approvals:
                    type: integer
                  escalations:
                    type: integer
                  rate:
                    type: number
                    nullable: true
                  window_hours:
                    type: number
        "400":
          description: Invalid ``hours`` parameter (non-numeric or non-positive)

  /api/drones/rules/suggest:
    post:
      tags: [Drones]
      summary: Suggest a new approval rule pattern from prompt text
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
      responses:
