          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Thread detail
        "404":
          description: Thread not found

  /api/queen/threads/{thread_id}/messages:
    post:
      tags: [Queen]
      summary: Post an operator message to a thread
      parameters:
